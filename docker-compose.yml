version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgres-go
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: go-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/users_db
      PORT: 8080